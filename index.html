<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Man Standing — Premier League</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple: #37003c;
            --pink: #e90052;
            --green: #10b981;
            --light: #f4f4f6;
            --white: #ffffff;
            --grey: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--light);
            color: #111;
            min-height: 100vh;
        }

        header {
            background: var(--purple);
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 22px; font-weight: 800; }
        header .subtitle { font-size: 13px; opacity: 0.65; margin-top: 2px; }

        .badge {
            background: var(--pink);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .layout {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 16px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 720px) {
            .layout { grid-template-columns: 1fr; }
        }

        .center-wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .card h2 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--purple);
        }

        .phase-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--pink);
            margin-bottom: 4px;
        }

        .help-text {
            font-size: 13px;
            color: var(--grey);
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s, transform 0.1s;
            text-align: center;
        }

        .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        .btn-primary { background: var(--purple); color: white; }
        .btn-danger  { background: var(--pink); color: white; }
        .btn-success { background: var(--green); color: white; }
        .btn-outline { background: white; color: var(--purple); border: 2px solid var(--purple); }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-full { width: 100%; }

        input[type="text"] {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus { border-color: var(--purple); }

        select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            width: 100%;
            background: white;
            cursor: pointer;
            outline: none;
        }

        select:focus { border-color: var(--purple); }

        .divider { height: 1px; background: var(--border); margin: 18px 0; }

        .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }

        .player-row:last-child { border-bottom: none; }
        .player-name { flex: 1; font-weight: 600; font-size: 14px; }

        .status-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .pill-in     { background: #d1fae5; color: #065f46; }
        .pill-out    { background: #fee2e2; color: #991b1b; }
        .pill-winner { background: #fef3c7; color: #78350f; }
        .pill-waiting { background: #f3f4f6; color: #6b7280; }

        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 17px;
            padding: 0 4px;
            line-height: 1;
            opacity: 0.7;
        }

        .remove-btn:hover { opacity: 1; }

        .result-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .result-row:last-child { border-bottom: none; }

        .result-row label {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--green);
            flex-shrink: 0;
        }

        .summary-box {
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }

        .summary-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .summary-box ul { padding-left: 16px; font-size: 13px; line-height: 1.8; }
        .summary-box:last-of-type { margin-bottom: 0; }

        .box-green { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .box-green h3 { color: #065f46; }
        .box-red   { background: #fff1f2; border: 1px solid #fecdd3; }
        .box-red h3 { color: #9f1239; }

        .winner-banner {
            background: linear-gradient(135deg, #37003c, #7c3aed);
            color: white;
            border-radius: 12px;
            padding: 36px 24px;
            text-align: center;
            margin-bottom: 20px;
        }

        .winner-banner .trophy { font-size: 52px; margin-bottom: 10px; }
        .winner-banner .winner-label { font-size: 13px; opacity: 0.75; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
        .winner-banner .winner-name { font-size: 34px; font-weight: 900; }
        .winner-banner .rounds-survived { font-size: 13px; opacity: 0.7; margin-top: 10px; }

        .history-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background: var(--light);
            padding: 6px 8px;
            text-align: left;
            font-weight: 700;
            color: var(--grey);
            white-space: nowrap;
        }

        td {
            padding: 6px 8px;
            border-top: 1px solid var(--border);
            white-space: nowrap;
        }

        .pick-win { color: #065f46; font-weight: 700; }
        .pick-out { color: #991b1b; font-weight: 700; }

        .empty-state {
            text-align: center;
            padding: 24px 0;
            color: var(--grey);
            font-size: 13px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--grey);
            margin-bottom: 8px;
        }

        .elim-name { color: #9ca3af; }

        /* Game code display */
        .code-display {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 10px;
            color: var(--purple);
            text-align: center;
            padding: 24px 0 8px;
            font-variant-numeric: tabular-nums;
        }

        .code-hint {
            font-size: 12px;
            color: var(--grey);
            text-align: center;
            margin-bottom: 20px;
        }

        .share-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 8px;
            background: #f3f0f6;
            border: 1px dashed #c084fc;
            border-radius: 8px;
            font-size: 13px;
            color: var(--purple);
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .share-btn:hover { background: #ede9f7; }

        /* Pick confirmation */
        .picked-confirm {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 14px;
            line-height: 1.6;
            color: #065f46;
        }

        /* Home screen */
        .home-icon { font-size: 48px; text-align: center; padding-bottom: 12px; }

        .error-msg {
            margin-top: 12px;
            color: #dc2626;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .loading-wrap {
            text-align: center;
            padding: 48px 24px;
        }

        .loading-wrap .spin { font-size: 32px; margin-bottom: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Feature 1 — Confirmation screen ───────────────── */
        .pick-confirmation {
            text-align: center;
            padding: 32px 24px;
        }
        .pick-confirmation .conf-team {
            font-size: 26px;
            font-weight: 900;
            color: var(--purple);
            margin: 10px 0 6px;
        }
        .pick-confirmation .conf-meta {
            font-size: 13px;
            color: var(--grey);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* ── Feature 2 — Countdown ──────────────────────────── */
        .countdown-box {
            background: var(--purple);
            color: white;
            border-radius: 10px;
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .countdown-box .cd-label {
            font-size: 10px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .countdown-box .cd-time {
            font-size: 26px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }
        .countdown-box.expired { background: var(--pink); }

        /* ── Feature 4 — Team grid ──────────────────────────── */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        .team-btn {
            padding: 10px 6px;
            min-height: 44px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.12s, background 0.12s;
            color: #111;
            line-height: 1.3;
        }
        .team-btn:hover:not(:disabled) { border-color: var(--purple); background: #faf5ff; }
        .team-btn.team-selected { border-color: var(--green); background: #f0fdf4; color: #065f46; }
        .team-btn.team-used {
            background: #f9fafb;
            color: #c4c4c4;
            border-color: #e5e7eb;
            cursor: not-allowed;
            text-decoration: line-through;
            font-weight: 400;
        }

        /* ── Feature 5 — Pick reveal ────────────────────────── */
        .reveal-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .reveal-row:last-child { border-bottom: none; }
        .reveal-row .reveal-team {
            flex: 1;
            color: var(--grey);
            font-size: 13px;
            text-align: right;
        }

        /* ── Feature 6 — Survival banner ────────────────────── */
        .survival-banner {
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .survival-banner.alive  { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .survival-banner.elim   { background: #fff1f2; border: 1px solid #fecdd3; }
        .survival-banner .sb-icon  { font-size: 26px; flex-shrink: 0; }
        .survival-banner .sb-title { font-size: 15px; font-weight: 700; }
        .survival-banner .sb-sub   { font-size: 12px; color: var(--grey); margin-top: 2px; }

        /* ── Feature 7 — Mobile ─────────────────────────────── */
        .btn { min-height: 44px; }
        .btn-sm { min-height: 36px; }

        @media (max-width: 480px) {
            header { padding: 12px 14px; }
            header h1 { font-size: 18px; }
            .center-wrap { padding: 14px 12px; gap: 14px; }
            .card { padding: 18px 14px; }
            .team-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
            .team-btn { font-size: 11px; padding: 8px 4px; }
            .code-display { font-size: 36px; letter-spacing: 6px; }
        }

        /* ── Phase 2 Admin styles ───────────────────────────── */
        .round-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .round-status.open   { background: #d1fae5; color: #065f46; }
        .round-status.closed { background: #fee2e2; color: #991b1b; }
        .round-status .dot   { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

        .picks-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .picks-row:last-child { border-bottom: none; }
        .picks-row .pr-name  { flex: 1; font-weight: 600; font-size: 14px; }
        .picks-row .pr-pick  { font-size: 13px; color: var(--grey); }
        .picks-row.unpicked  { background: #fffbeb; margin: 0 -24px; padding: 10px 24px; }

        .elim-preview {
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            line-height: 1.8;
        }

        .override-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }
        .override-row:last-child { border-bottom: none; }
        .override-row .or-name { flex: 1; font-weight: 600; font-size: 13px; }
        .btn-xs {
            padding: 5px 10px;
            font-size: 12px;
            min-height: 30px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-xs-danger   { background: #fee2e2; color: #991b1b; }
        .btn-xs-success  { background: #d1fae5; color: #065f46; }
        .btn-xs:hover { opacity: 0.8; }

        /* ── Phase 3 styles ─────────────────────────────────────────── */

        .feed-entry { border-bottom: 1px solid var(--border); padding: 12px 0; }
        .feed-entry:last-child { border-bottom: none; }
        .feed-round-header {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--purple);
            margin-bottom: 8px;
        }
        .feed-elim   { font-size: 13px; color: #991b1b; margin-bottom: 3px; }
        .feed-survive { font-size: 13px; color: #065f46; margin-bottom: 3px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }
        .stat-item {
            background: var(--light);
            border-radius: 8px;
            padding: 12px 10px;
        }
        .stat-label { font-size: 11px; color: var(--grey); margin-bottom: 4px; font-weight: 600; }
        .stat-value { font-size: 14px; font-weight: 700; color: var(--purple); line-height: 1.3; }
        .stat-sub   { font-size: 11px; color: var(--grey); margin-top: 2px; }

        .copy-result-btn {
            display: block;
            width: 100%;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #065f46;
            cursor: pointer;
            text-align: center;
            margin-top: 14px;
        }
        .copy-result-btn:hover { background: #dcfce7; }

        /* ── Multi-game styles ──────────────────────────────────────── */
        .saved-game-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 0;
            border-bottom: 1px solid var(--border);
        }
        .saved-game-row:last-child { border-bottom: none; }
        .saved-game-info { flex: 1; }
        .saved-game-name { font-weight: 700; font-size: 14px; }
        .saved-game-meta { font-size: 12px; color: var(--grey); margin-top: 2px; }

        .host-player-banner {
            background: #fef3c7;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #92400e;
            font-weight: 600;
        }

        .tab-row {
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 18px;
        }
        .tab-btn {
            flex: 1;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 600;
            background: white;
            border: none;
            cursor: pointer;
            color: var(--grey);
        }
        .tab-btn.tab-active { background: var(--purple); color: white; }
        .tab-btn:hover:not(.tab-active) { background: var(--light); }

        /* ── Phase 5 — Live data styles ─────────────────────────────────────── */
        .matchday-info { background: var(--light); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; }
        .matchday-info .md-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--grey); margin-bottom: 4px; }
        .matchday-info .md-value { font-size: 15px; font-weight: 700; color: var(--purple); }
        .matchday-info .md-sub { font-size: 12px; color: var(--grey); margin-top: 3px; }
        .live-error { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #9f1239; margin-bottom: 14px; }
        .auto-status { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #065f46; margin-bottom: 14px; }
        .match-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .match-row:last-child { border-bottom: none; }
        .match-status-pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
        .match-finished { background: #d1fae5; color: #065f46; }
        .match-live { background: #fee2e2; color: #991b1b; }
        .match-upcoming { background: #f3f4f6; color: #6b7280; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>⚽ Last Man Standing</h1>
        <div class="subtitle">Premier League Survivor</div>
    </div>
    <div id="headerRight"></div>
</header>

<div id="app"></div>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────────────────────
// REPLACE THE VALUES BELOW with your Firebase config from Project Settings
const firebaseConfig = {
    apiKey:            "AIzaSyDesqpACAf9bosKpD1cNcN5VbJp_MbXiV4",
    authDomain:        "last-man-standing-51f6e.firebaseapp.com",
    databaseURL:       "https://last-man-standing-51f6e-default-rtdb.firebaseio.com",
    projectId:         "last-man-standing-51f6e",
    storageBucket:     "last-man-standing-51f6e.firebasestorage.app",
    messagingSenderId: "168038923018",
    appId:             "1:168038923018:web:010798e715eb27274dd8f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── FOOTBALL API ──────────────────────────────────────────────────────────────
// Get your free API key at football-data.org
const FOOTBALL_API_KEY = 'YOUR_KEY_HERE';
const FOOTBALL_API_BASE = 'https://api.football-data.org/v4';

// ── TEAMS ────────────────────────────────────────────────────────────────────
const FALLBACK_TEAMS = [
    "Arsenal","Aston Villa","Bournemouth","Brentford","Brighton",
    "Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town",
    "Leicester City","Liverpool","Man City","Man United","Newcastle",
    "Nottm Forest","Southampton","Tottenham","West Ham","Wolves"
];

// ── LOCALSTORAGE HELPERS ──────────────────────────────────────────────────────
function savedGames() {
    try { return JSON.parse(localStorage.getItem('lms_games') || '[]'); } catch { return []; }
}
function saveGame(code, rle, pid, name, gameName) {
    const games = savedGames().filter(g => g.code !== code);
    games.push({ code, role: rle, pid, name, gameName: gameName || code });
    localStorage.setItem('lms_games', JSON.stringify(games));
}
function removeGame(code) {
    localStorage.setItem('lms_games', JSON.stringify(savedGames().filter(g => g.code !== code)));
}
function migrateLegacyLocalStorage() {
    const oldCode = localStorage.getItem('lms_code');
    const oldRole = localStorage.getItem('lms_role');
    const oldPid  = localStorage.getItem('lms_pid');
    if (oldCode && oldRole) {
        if (!localStorage.getItem('lms_games')) saveGame(oldCode, oldRole, oldPid || null, 'Player', oldCode);
        localStorage.removeItem('lms_code');
        localStorage.removeItem('lms_role');
        localStorage.removeItem('lms_pid');
    }
}

// ── SESSION STATE ────────────────────────────────────────────────────────────
let gameCode     = null;
let role         = null;   // 'host' | 'player'
let myPlayerId   = null;
let myName       = null;
let G            = null;   // live game snapshot from Firebase
let gameRef      = null;
let gameListener = null;

// Sub-view state (local only, not Firebase)
let playerSubView     = 'main'; // 'main' | 'confirmation' | 'history' | 'allpicks' | 'feed'
let lastConfirmedTeam = null;
let countdownTimer    = null;
let hostView          = 'admin'; // 'admin' | 'player' — host toggling to player view

// Live data state
let cachedTeams          = null; // string[] from API
let cachedMatchday       = null; // { matchday, matches, firstKickoff }
let liveDataError        = null;
let lastResultsCheck     = null;
let resultsPollingTimer  = null;
let autoCloseTimer       = null;

// ── UTILITIES ────────────────────────────────────────────────────────────────
function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function genCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function players()      { return Object.values(G.players || {}); }
function activePlayers(){ return players().filter(p => p.active); }
function getPlayer(id)  { return (G.players || {})[id]; }

function rounds() {
    return Object.values(G.rounds || {}).sort((a, b) => a.id - b.id);
}

function currentRound() {
    const rs = rounds();
    return rs[rs.length - 1] || null;
}

function getTeams() {
    return cachedTeams || FALLBACK_TEAMS;
}

function availableTeams(playerId) {
    const p = getPlayer(playerId);
    if (!p) return getTeams();
    const used = p.usedTeams || {};
    return getTeams().filter(t => !used[t]);
}

// ── Countdown helpers ─────────────────────────────────────────────────────────

function pad(n) { return String(n).padStart(2, '0'); }

function formatCountdown(ms) {
    if (ms <= 0) return 'Closed';
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d > 0) return `${d}d ${pad(h)}h ${pad(m)}m`;
    if (h > 0) return `${pad(h)}h ${pad(m)}m ${pad(sec)}s`;
    return `${pad(m)}m ${pad(sec)}s`;
}

function startCountdown(closeTime) {
    if (countdownTimer) clearInterval(countdownTimer);
    if (!closeTime) return;
    const tick = () => {
        const el = document.getElementById('countdownDisplay');
        if (!el) { clearInterval(countdownTimer); countdownTimer = null; return; }
        const ms = new Date(closeTime) - Date.now();
        el.textContent = formatCountdown(ms);
        el.closest('.countdown-box')?.classList.toggle('expired', ms <= 0);
    };
    tick();
    countdownTimer = setInterval(tick, 1000);
}

function formatDatetimeLocal(iso) {
    if (!iso) return '';
    return new Date(iso).toISOString().slice(0, 16);
}

// ── Feature 6 — Survival banner ───────────────────────────────────────────────

function renderSurvivalBanner() {
    const p = getPlayer(myPlayerId);
    if (!p) return '';
    const doneCount = rounds().filter(r => r.status === 'done').length;

    if (!p.active) {
        const elimRound = rounds().find(r => r.id === p.eliminatedRound);
        const lastPick  = elimRound ? (elimRound.picks || {})[myPlayerId] : null;
        return `<div class="survival-banner elim">
            <div class="sb-icon">❌</div>
            <div>
                <div class="sb-title">Eliminated — Round ${p.eliminatedRound}</div>
                ${lastPick?.team ? `<div class="sb-sub">${esc(lastPick.team)} didn't win</div>` : ''}
            </div>
        </div>`;
    }
    return `<div class="survival-banner alive">
        <div class="sb-icon">✅</div>
        <div>
            <div class="sb-title">Still in!</div>
            <div class="sb-sub">${doneCount > 0 ? `Survived ${doneCount} round${doneCount !== 1 ? 's' : ''}` : 'Game in progress'}</div>
        </div>
    </div>`;
}

// ── Feature 3 — History link button ──────────────────────────────────────────

function renderMyPickHistoryBtn() {
    const done = rounds().filter(r => r.status === 'done');
    if (!done.length) return '';
    return `<button class="btn btn-outline btn-full btn-sm" onclick="playerSubView='history';render()">
        📋 View my pick history
    </button>`;
}

// ── Feature 5 — Round pick reveal ────────────────────────────────────────────

function renderRoundPickReveal(round) {
    const picks = Object.values(round.picks || {});
    if (!picks.length) return '';
    const rows = picks.map(pick => {
        const p = getPlayer(pick.playerId);
        const isMe = pick.playerId === myPlayerId;
        let pill = '';
        if (pick.result === 'win') pill = '<span class="status-pill pill-in">✓ Won</span>';
        else if (pick.result === 'out') pill = '<span class="status-pill pill-out">✕ Out</span>';
        return `<div class="reveal-row">
            <span style="font-weight:${isMe ? '700' : '500'}">${esc(p?.name || pick.playerId)}${isMe ? ' <span style="font-size:11px;font-weight:400;color:var(--grey)">(you)</span>' : ''}</span>
            <span class="reveal-team">${esc(pick.team || '—')}</span>
            ${pill}
        </div>`;
    }).join('');
    return `<div class="card">
        <h2>Round ${round.id} — All Picks</h2>
        ${rows}
    </div>`;
}

// ── FIREBASE ACTIONS ─────────────────────────────────────────────────────────

async function createGame(hostName, gameName) {
    showLoading();
    let code;
    for (let i = 0; i < 10; i++) {
        code = genCode();
        const snap = await db.ref(`games/${code}`).once('value');
        if (!snap.exists()) break;
    }

    const gName = gameName || 'Last Man Standing';
    await db.ref(`games/${code}`).set({
        status: 'setup',
        gameName: gName,
        winner: null,
        nextId: 2,
        players: {
            p1: { id: 'p1', name: hostName, active: true, usedTeams: {}, eliminatedRound: null }
        },
        rounds: {}
    });

    gameCode = code; role = 'host'; myPlayerId = 'p1'; myName = hostName; hostView = 'admin';
    saveGame(code, 'host', 'p1', hostName, gName);
    listenToGame();
}

async function joinGame(code, name) {
    code = code.toUpperCase().trim();
    name = name.trim();
    if (!code || !name) { showHomeError('Enter both a game code and your name.'); return; }

    showLoading();

    const snap = await db.ref(`games/${code}`).once('value');
    if (!snap.exists()) { showHomeError('Game not found — double-check the code.'); return; }

    const game = snap.val();
    if (game.status !== 'setup') { showHomeError('That game has already started.'); return; }

    const taken = Object.values(game.players || {}).some(
        p => p.name.toLowerCase() === name.toLowerCase()
    );
    if (taken) { showHomeError('That name is already taken. Try a different one.'); return; }

    const nextId = game.nextId || 1;
    const pid = 'p' + nextId;

    await db.ref(`games/${code}/players/${pid}`).set({
        id: pid, name, active: true, usedTeams: {}, eliminatedRound: null
    });
    await db.ref(`games/${code}/nextId`).set(nextId + 1);

    gameCode = code; role = 'player'; myPlayerId = pid; myName = name; hostView = 'admin';
    saveGame(code, 'player', pid, name, game.gameName || code);
    listenToGame();
}

function listenToGame() {
    if (gameRef) { gameRef.off('value', gameListener); }
    gameRef = db.ref(`games/${gameCode}`);
    gameListener = gameRef.on('value', snap => {
        G = snap.val();
        if (!G) { returnToHome(); return; }

        if (role === 'host') {
            const round = currentRound();
            // Resume auto-close if picking round has a kickoff time and timer isn't running
            if (round?.status === 'picking' && !autoCloseTimer && round.firstKickoff) {
                if (!cachedMatchday) {
                    cachedMatchday = { matchday: round.matchday || null, matches: [], firstKickoff: round.firstKickoff };
                }
                scheduleAutoClose();
            }
            // Resume results polling if round is awaiting results
            if (round?.status === 'results' && !resultsPollingTimer) {
                startResultsPolling();
            }
        }

        render();
    });
}

function returnToHome() {
    if (countdownTimer)       { clearInterval(countdownTimer);       countdownTimer = null; }
    if (resultsPollingTimer)  { clearInterval(resultsPollingTimer);  resultsPollingTimer = null; }
    if (autoCloseTimer)       { clearTimeout(autoCloseTimer);        autoCloseTimer = null; }
    if (gameRef) { gameRef.off('value', gameListener); gameRef = null; }
    gameCode = null; role = null; myPlayerId = null; myName = null; G = null;
    playerSubView = 'main'; lastConfirmedTeam = null; hostView = 'admin';
    cachedMatchday = null; liveDataError = null; lastResultsCheck = null;
    render();
}

async function leaveGamePermanently() {
    if (role === 'host') {
        alert("You're the host — you can't leave your own game. Use 'Reset & Delete Game' in the admin panel.");
        return;
    }
    if (!confirm("Leave this game? You'll be removed permanently.")) return;
    const code = gameCode;
    const pid  = myPlayerId;
    returnToHome();
    removeGame(code);
    if (pid) await db.ref(`games/${code}/players/${pid}`).remove();
}

// ── LIVE DATA — API FUNCTIONS ─────────────────────────────────────────────────

function apiConfigured() {
    return FOOTBALL_API_KEY && FOOTBALL_API_KEY !== 'YOUR_KEY_HERE';
}

async function apiFetch(endpoint) {
    if (!apiConfigured()) throw new Error('No API key configured');
    const res = await fetch(`${FOOTBALL_API_BASE}${endpoint}`, {
        headers: { 'X-Auth-Token': FOOTBALL_API_KEY }
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
}

async function fetchTeams() {
    try {
        const data = await apiFetch('/competitions/PL/teams?season=2024');
        cachedTeams = data.teams.map(t => t.shortName || t.name).sort();
        liveDataError = null;
    } catch (e) {
        liveDataError = 'Could not load teams — using fallback list.';
    }
}

async function fetchFixtures() {
    try {
        const comp = await apiFetch('/competitions/PL');
        const matchday = comp.currentSeason.currentMatchday;
        const data = await apiFetch(`/competitions/PL/matches?matchday=${matchday}`);
        const matches = data.matches || [];
        const kickoffs = matches
            .filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED')
            .map(m => m.utcDate).sort();
        cachedMatchday = { matchday, matches, firstKickoff: kickoffs[0] || null };
        liveDataError = null;
        return cachedMatchday;
    } catch (e) {
        liveDataError = 'Could not fetch fixtures. Check your API key.';
        return null;
    }
}

async function fetchFinishedMatches() {
    if (!cachedMatchday) return null;
    try {
        const data = await apiFetch(`/competitions/PL/matches?matchday=${cachedMatchday.matchday}`);
        const matches = data.matches || [];
        cachedMatchday = { ...cachedMatchday, matches };
        liveDataError = null;
        return matches;
    } catch (e) {
        liveDataError = 'Could not fetch results.';
        return null;
    }
}

function formatMatchTime(utcDate) {
    if (!utcDate) return '—';
    return new Date(utcDate).toLocaleString('en-GB', {
        weekday: 'short', day: 'numeric', month: 'short',
        hour: '2-digit', minute: '2-digit'
    });
}

async function processResultsFromAPI(matches) {
    const round = currentRound();
    if (!round || round.status !== 'results') return;

    // Build set of winning team names (shortName to match what we stored in picks)
    const winSet = new Set();
    matches.filter(m => m.status === 'FINISHED').forEach(m => {
        const h = m.score?.fullTime?.home ?? 0;
        const a = m.score?.fullTime?.away ?? 0;
        if (h > a) winSet.add(m.homeTeam.shortName || m.homeTeam.name);
        else if (a > h) winSet.add(m.awayTeam.shortName || m.awayTeam.name);
        // draw: neither team wins
    });

    const picks = Object.values(round.picks || {});
    const updates = {};

    picks.forEach(pick => {
        const result = winSet.has(pick.team) ? 'win' : 'out';
        updates[`games/${gameCode}/rounds/r${round.id}/picks/${pick.playerId}/result`] = result;
        if (result === 'out') {
            updates[`games/${gameCode}/players/${pick.playerId}/active`] = false;
            updates[`games/${gameCode}/players/${pick.playerId}/eliminatedRound`] = round.id;
        }
    });

    [...winSet].forEach(t => {
        updates[`games/${gameCode}/rounds/r${round.id}/winningTeams/${t.replace(/\s+/g,'_')}`] = true;
    });

    updates[`games/${gameCode}/rounds/r${round.id}/status`] = 'done';

    const survivors = players().filter(p => {
        if (!p.active) return false;
        const pick = picks.find(pk => pk.playerId === p.id);
        return pick && winSet.has(pick.team);
    });

    if (survivors.length === 1) {
        updates[`games/${gameCode}/status`] = 'complete';
        updates[`games/${gameCode}/winner`] = survivors[0].id;
    } else if (survivors.length === 0) {
        updates[`games/${gameCode}/status`] = 'complete';
        updates[`games/${gameCode}/winner`] = null;
    }

    await db.ref().update(updates);
}

async function checkAndProcessResults() {
    if (!gameCode || !G) return;
    const round = currentRound();
    if (!round || round.status !== 'results') { stopResultsPolling(); return; }

    lastResultsCheck = new Date();
    const matches = await fetchFinishedMatches();
    if (!matches) { render(); return; }

    const DONE_STATUSES = ['FINISHED', 'CANCELLED', 'POSTPONED', 'AWARDED', 'SUSPENDED'];
    const allDone = matches.length > 0 && matches.every(m => DONE_STATUSES.includes(m.status));

    if (allDone) {
        stopResultsPolling();
        await processResultsFromAPI(matches);
    } else {
        render();
    }
}

function startResultsPolling() {
    stopResultsPolling();
    checkAndProcessResults();
    resultsPollingTimer = setInterval(checkAndProcessResults, 5 * 60 * 1000);
}

function stopResultsPolling() {
    if (resultsPollingTimer) { clearInterval(resultsPollingTimer); resultsPollingTimer = null; }
}

function scheduleAutoClose() {
    if (autoCloseTimer) { clearTimeout(autoCloseTimer); autoCloseTimer = null; }
    if (!cachedMatchday?.firstKickoff) return;
    const closeAt = new Date(cachedMatchday.firstKickoff).getTime() - 60 * 60 * 1000;
    const delay   = closeAt - Date.now();
    if (delay <= 0) { autoClosePicks(); return; }
    autoCloseTimer = setTimeout(autoClosePicks, delay);
}

async function autoClosePicks() {
    autoCloseTimer = null;
    const round = currentRound();
    if (!round || round.status !== 'picking') return;
    const picks = Object.values(round.picks || {});
    const updates = {};
    picks.filter(p => p.team).forEach(pick => {
        updates[`games/${gameCode}/players/${pick.playerId}/usedTeams/${pick.team}`] = true;
    });
    updates[`games/${gameCode}/rounds/r${round.id}/status`] = 'results';
    await db.ref().update(updates);
    startResultsPolling();
}

async function activateGameweek() {
    showLoading();
    await fetchTeams();
    const fixture = await fetchFixtures();
    if (!fixture) { render(); return; }

    const roundNum = rounds().length + 1;
    const picks = {};
    activePlayers().forEach(p => {
        picks[p.id] = { playerId: p.id, team: null, result: null };
    });

    await db.ref(`games/${gameCode}/rounds/r${roundNum}`).set({
        id: roundNum,
        status: 'picking',
        picks,
        winningTeams: {},
        matchday: fixture.matchday,
        firstKickoff: fixture.firstKickoff || null
    });

    scheduleAutoClose();
}

async function refreshResults() {
    liveDataError = null;
    await checkAndProcessResults();
    render();
}

// Host actions
async function hostStartGame() {
    if (players().length < 2) return;
    await db.ref(`games/${gameCode}/status`).set('active');
}

async function hostRemovePlayer(pid) {
    if (pid === myPlayerId) return;
    if (!confirm('Remove this player?')) return;
    await db.ref(`games/${gameCode}/players/${pid}`).remove();
}

async function hostStartRound() {
    const roundNum = rounds().length + 1;
    const picks = {};
    activePlayers().forEach(p => {
        picks[p.id] = { playerId: p.id, team: null, result: null };
    });
    await db.ref(`games/${gameCode}/rounds/r${roundNum}`).set({
        id: roundNum, status: 'picking', picks, winningTeams: {}
    });
}

async function hostSetCloseTime(val) {
    const round = currentRound();
    if (!round) return;
    const iso = val ? new Date(val).toISOString() : null;
    await db.ref(`games/${gameCode}/rounds/r${round.id}/closeTime`).set(iso);
}

async function hostLockPicks() {
    const round = currentRound();
    const picks = Object.values(round.picks || {});

    if (!picks.every(p => p.team)) {
        alert('Not everyone has picked yet — wait for all picks before locking.');
        return;
    }

    const teams = picks.map(p => p.team);
    const dupes = teams.filter((t, i) => teams.indexOf(t) !== i);
    if (dupes.length) {
        alert(`Duplicate pick: ${[...new Set(dupes)].join(', ')}. Each player must pick a different team.`);
        return;
    }

    const updates = {};
    picks.forEach(pick => {
        updates[`games/${gameCode}/players/${pick.playerId}/usedTeams/${pick.team}`] = true;
    });
    updates[`games/${gameCode}/rounds/r${round.id}/status`] = 'results';
    await db.ref().update(updates);
}

async function hostSubmitResults() {
    const round = currentRound();
    const picks = Object.values(round.picks || {});
    const checked = Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value);
    const winSet = new Set(checked);

    const updates = {};

    picks.forEach(pick => {
        const result = winSet.has(pick.team) ? 'win' : 'out';
        updates[`games/${gameCode}/rounds/r${round.id}/picks/${pick.playerId}/result`] = result;
        if (result === 'out') {
            updates[`games/${gameCode}/players/${pick.playerId}/active`] = false;
            updates[`games/${gameCode}/players/${pick.playerId}/eliminatedRound`] = round.id;
        }
    });

    checked.forEach(t => {
        updates[`games/${gameCode}/rounds/r${round.id}/winningTeams/${t.replace(/\s+/g,'_')}`] = true;
    });

    updates[`games/${gameCode}/rounds/r${round.id}/status`] = 'done';

    // Determine survivors after this round
    const survivors = players().filter(p => {
        if (!p.active) return false;
        const pick = picks.find(pk => pk.playerId === p.id);
        return pick && winSet.has(pick.team);
    });

    if (survivors.length === 1) {
        updates[`games/${gameCode}/status`] = 'complete';
        updates[`games/${gameCode}/winner`] = survivors[0].id;
    } else if (survivors.length === 0) {
        updates[`games/${gameCode}/status`] = 'complete';
        updates[`games/${gameCode}/winner`] = null;
    }

    await db.ref().update(updates);
}

// Player action
async function playerSetPick(team) {
    const round = currentRound();
    if (!round || round.status !== 'picking' || !team) return;
    // Show confirmation immediately, then write to Firebase
    lastConfirmedTeam = team;
    playerSubView = 'confirmation';
    render();
    await db.ref(`games/${gameCode}/rounds/r${round.id}/picks/${myPlayerId}/team`).set(team);
}

async function confirmReset() {
    if (!confirm('Delete this game and start fresh? Everything will be gone.')) return;
    const code = gameCode;
    returnToHome();
    removeGame(code);
    await db.ref(`games/${code}`).remove();
}

function confirmLeave() {

}

function render() {
    updateHeader();

    if (!gameCode || !G) { renderHome(); return; }

    const round = currentRound();

    if (role === 'host' && hostView === 'admin') {
        renderHost(round);
    } else {
        renderPlayer(round);
    }
}

function updateHeader() {
    const el = document.getElementById('headerRight');
    if (gameCode && G) {
        const viewLabel = role === 'host'
            ? (hostView === 'player' ? '⚽ My Picks' : '👔 Host')
            : esc(getPlayer(myPlayerId)?.name || myName || '');
        el.innerHTML = `
            <div style="text-align:right">
                <div class="badge">${esc(gameCode)}</div>
                <div style="font-size:11px;opacity:0.65;margin-top:4px">${viewLabel}</div>
                <div style="font-size:10px;opacity:0.5;margin-top:3px;cursor:pointer;text-decoration:underline" onclick="returnToHome()">← All Games</div>
            </div>`;
    } else {
        el.innerHTML = '';
    }
}

function showLoading() {
    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            <div class="card loading-wrap">
                <div class="spin">⚽</div>
                <p style="color:var(--grey)">Loading...</p>
            </div>
        </div>`;
}

function showHostForm() {
    const j = document.getElementById('joinForm'); if (j) j.style.display = 'none';
    const f = document.getElementById('hostForm');
    if (f) { f.style.display = 'block'; document.getElementById('hostName').focus(); }
}

function showJoinForm() {
    const h = document.getElementById('hostForm'); if (h) h.style.display = 'none';
    const f = document.getElementById('joinForm');
    if (f) { f.style.display = 'block'; document.getElementById('joinCode').focus(); }
}

function showHomeError(msg) {
    render();
    setTimeout(() => {
        const el = document.getElementById('homeError');
        if (el) { el.textContent = msg; el.style.display = 'block'; }
    }, 50);
}

async function doCreateGame() {
    const name     = document.getElementById('hostName')?.value.trim();
    const gameName = document.getElementById('hostGameName')?.value.trim();
    if (!name) { showHomeError('Enter your name to create a game.'); return; }
    await createGame(name, gameName);
}

async function doJoin() {
    const code = document.getElementById('joinCode')?.value || '';
    const name = document.getElementById('joinName')?.value || '';
    await joinGame(code, name);
}

async function continueGame(code) {
    const saved = savedGames().find(g => g.code === code);
    if (!saved) { render(); return; }
    showLoading();
    const snap = await db.ref(`games/${code}`).once('value');
    if (!snap.exists()) {
        removeGame(code);
        render();
        setTimeout(() => {
            const el = document.getElementById('homeError');
            if (el) { el.textContent = `Game ${code} no longer exists — it may have been deleted.`; el.style.display = 'block'; }
        }, 50);
        return;
    }
    const gameData = snap.val();
    if (saved.pid && saved.role === 'player' && !(gameData.players || {})[saved.pid]) {
        removeGame(code);
        render();
        setTimeout(() => {
            const el = document.getElementById('homeError');
            if (el) { el.textContent = `You were removed from game ${code}.`; el.style.display = 'block'; }
        }, 50);
        return;
    }
    gameCode = code; role = saved.role; myPlayerId = saved.pid; myName = saved.name;
    hostView = 'admin'; playerSubView = 'main';
    listenToGame();
}

        <span>👔 Admin — viewing as player</span>

// Feature 5 — Manual override
async function adminReinstate(pid) {
    const p = getPlayer(pid);
    if (!confirm(`Reinstate ${p?.name}? They'll be marked as active again from the next round.`)) return;
    await db.ref().update({
        [`games/${gameCode}/players/${pid}/active`]: true,
        [`games/${gameCode}/players/${pid}/eliminatedRound`]: null
    });
}

async function adminEliminate(pid) {
    const p = getPlayer(pid);
    if (!confirm(`Manually eliminate ${p?.name}? You can reinstate them later if needed.`)) return;
    const round = currentRound();
    await db.ref().update({
        [`games/${gameCode}/players/${pid}/active`]: false,
        [`games/${gameCode}/players/${pid}/eliminatedRound`]: round?.id || 0
    });
}

function renderAdminPlayerManagement() {
    const ps = players();
    if (!ps.length) return '';
    const rows = ps.map(p => `
        <div class="override-row">
            <span class="or-name">${esc(p.name)}</span>
            <span class="status-pill ${p.active ? 'pill-in' : 'pill-out'}" style="font-size:10px">${p.active ? 'In' : `Rd ${p.eliminatedRound}`}</span>
            ${p.active
                ? `<button class="btn-xs btn-xs-danger" onclick="adminEliminate('${p.id}')">Eliminate</button>`
                : `<button class="btn-xs btn-xs-success" onclick="adminReinstate('${p.id}')">Reinstate</button>`}
        </div>`).join('');
    return `<div class="card">
        <h2>Player Management</h2>
        <p class="help-text">Manually override any player's status. Confirmation required for each change.</p>
        ${rows}

}

// Feature 3 — Live elimination preview on results screen
function updateEliminationPreview() {
    const round = currentRound();
    if (!round) return;
    const picks = Object.values(round.picks || {});
    const checked = Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value);
    const winSet = new Set(checked);
    const el = document.getElementById('elimPreview');
    if (!el) return;
    if (!checked.length) {
        el.innerHTML = '<p style="color:var(--grey)">Tick the teams that won to see who survives.</p>';
        return;
    }
    const survive  = picks.filter(p => p.team && winSet.has(p.team)).map(p => esc(getPlayer(p.playerId)?.name)).filter(Boolean);
    const elim     = picks.filter(p => p.team && !winSet.has(p.team)).map(p => esc(getPlayer(p.playerId)?.name)).filter(Boolean);
    el.innerHTML = `
        ${survive.length ? `<div style="color:#065f46;margin-bottom:4px">✅ Survive: <strong>${survive.join(', ')}</strong></div>` : ''}
        ${elim.length    ? `<div style="color:#991b1b">❌ Eliminated: <strong>${elim.join(', ')}</strong></div>` : ''}`;
}

function renderHost(round) {
    if (G.status === 'setup')    { renderHostSetup(); return; }

    if (round.status === 'picking') renderHostPicking(round);

    else if (round.status === 'done')    renderHostRoundDone(round);
}

function renderHostPicking(round) {
    const picks       = Object.values(round.picks || {});
    const allPicked   = picks.every(p => p.team);
    const pickedCount = picks.filter(p => p.team).length;
    const unpicked    = picks.filter(p => !p.team);
    const hasApi      = apiConfigured();

    const rows = picks.map(pick => {
        const p       = getPlayer(pick.playerId);
        const hasPick = !!pick.team;
        return `<div class="picks-row${hasPick ? '' : ' unpicked'}">
            <span class="pr-name">${esc(p?.name || pick.playerId)}</span>
            ${hasPick
                ? `<span class="pr-pick">${esc(pick.team)}</span><span class="status-pill pill-in" style="font-size:10px">✓ Picked</span>`
                : `<span class="pr-pick" style="color:#d97706">Not picked yet</span><span class="status-pill pill-waiting" style="font-size:10px">Waiting</span>`}
        </div>`;
    }).join('');

    const matchesHtml = cachedMatchday?.matches?.length ? `
        <div style="margin-top:14px">
            <div class="section-label" style="margin-bottom:6px">Gameweek ${cachedMatchday.matchday} fixtures</div>
            ${cachedMatchday.matches.slice(0, 6).map(m => {
                let pill;
                if (m.status === 'FINISHED') pill = `<span class="match-status-pill match-finished">Done</span>`;
                else if (m.status === 'IN_PLAY' || m.status === 'PAUSED') pill = `<span class="match-status-pill match-live">Live</span>`;
                else pill = `<span class="match-status-pill match-upcoming">${formatMatchTime(m.utcDate)}</span>`;
                return `<div class="match-row">
                    <span>${esc(m.homeTeam?.shortName || '?')} v ${esc(m.awayTeam?.shortName || '?')}</span>
                    ${pill}
                </div>`;
            }).join('')}
            ${cachedMatchday.matches.length > 6 ? `<div style="font-size:12px;color:var(--grey);padding-top:6px">+${cachedMatchday.matches.length - 6} more</div>` : ''}
        </div>` : '';

    const autoInfo = round.firstKickoff
        ? `<div class="auto-status">⏱ Picks auto-close 1 hour before kick-off (${formatMatchTime(round.firstKickoff)})</div>`
        : '';

    const manualControls = !hasApi ? `
        <div class="divider"></div>
        <button class="btn btn-danger btn-full" onclick="hostLockPicks()" ${allPicked ? '' : 'disabled'}>
            🔴 Close Round &amp; Lock Picks
        </button>
        ${!allPicked ? `<p style="font-size:12px;color:var(--grey);text-align:center;margin-top:8px">${unpicked.length} player${unpicked.length !== 1 ? 's' : ''} still to pick.</p>` : ''}
        <div class="divider"></div>
        <div class="section-label" style="margin-bottom:6px">Pick deadline (optional)</div>
        <p style="font-size:12px;color:var(--grey);margin-bottom:8px">Set a time so players see a countdown.</p>
        <input type="datetime-local" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px"
            value="${round.closeTime ? formatDatetimeLocal(round.closeTime) : ''}"
            onchange="hostSetCloseTime(this.value)">` : '';

    document.getElementById('app').innerHTML = `
        <div class="layout">
            <div>
                <div class="card">
                    ${renderAdminTab()}
                    <div class="phase-label">Admin — Round Control</div>
                    <h2>Round ${round.id} — Picks Dashboard</h2>
                    <div class="round-status open"><div class="dot"></div> Round open</div>
                    ${autoInfo}
                    <div class="section-label" style="margin-bottom:8px">Picks received (${pickedCount} / ${picks.length})</div>
                    ${rows}
                    ${unpicked.length ? `
                        <div class="divider"></div>
                        <button class="btn btn-outline btn-full btn-sm" onclick="copyReminderLink()">
                            📲 Copy reminder (${unpicked.length} haven't picked)
                        </button>` : ''}
                    ${manualControls}
                    ${matchesHtml}
                </div>
            </div>
            <div>${renderStandings()}${renderResultsFeed()}</div>

}

function renderHostResults(round) {
    const hasApi = apiConfigured();

    if (!hasApi) {
        // Manual mode — original checkbox UI
        const picks = Object.values(round.picks || {});
        const pickedTeams = [...new Set(picks.map(p => p.team))].sort();
        const rows = pickedTeams.map(team => {
            const who    = picks.filter(p => p.team === team).map(p => getPlayer(p.playerId)?.name).filter(Boolean).join(', ');
            const safeId = team.replace(/\s+/g, '_');
            return `
                <div class="result-row" onclick="document.getElementById('cb_${safeId}').click();updateEliminationPreview()">
                    <input type="checkbox" id="cb_${safeId}" value="${esc(team)}"
                        onclick="event.stopPropagation()" onchange="updateEliminationPreview()">
                    <label for="cb_${safeId}">
                        ${esc(team)}
                        <span style="font-size:12px;color:var(--grey);font-weight:400"> — ${esc(who)}</span>
                    </label>
                    <span style="font-size:12px;color:var(--grey)">won ✓</span>
                </div>`;
        }).join('');
        document.getElementById('app').innerHTML = `
            <div class="layout">
                <div>
                    <div class="card">
                        ${renderAdminTab()}
                        <div class="phase-label">Round ${round.id} — Results</div>
                        <h2>Which teams won?</h2>
                        <p class="help-text">Tick every team that won. Draws and losses = eliminated.</p>
                        ${rows}
                        <div class="divider"></div>
                        <div class="elim-preview" id="elimPreview">
                            <p style="color:var(--grey)">Tick the teams that won to see who survives.</p>
                        </div>
                        <button class="btn btn-primary btn-full" onclick="hostSubmitResults()">
                            Submit Results &amp; Eliminate →
                        </button>
                    </div>
                </div>
                <div>${renderStandings()}${renderResultsFeed()}</div>
            </div>`;
        return;
    }

    // API mode — auto-processing
    const matches = cachedMatchday?.matches || [];
    const DONE_STATUSES = ['FINISHED', 'CANCELLED', 'POSTPONED', 'AWARDED', 'SUSPENDED'];
    const allDone = matches.length > 0 && matches.every(m => DONE_STATUSES.includes(m.status));

    const matchRows = matches.map(m => {
        let pill;
        if (m.status === 'FINISHED') {
            const h = m.score?.fullTime?.home ?? '?';
            const a = m.score?.fullTime?.away ?? '?';
            pill = `<span class="match-status-pill match-finished">${h}–${a}</span>`;
        } else if (m.status === 'IN_PLAY' || m.status === 'PAUSED') {
            pill = `<span class="match-status-pill match-live">Live</span>`;
        } else {
            pill = `<span class="match-status-pill match-upcoming">${formatMatchTime(m.utcDate)}</span>`;
        }
        return `<div class="match-row">
            <span>${esc(m.homeTeam?.shortName || '?')} v ${esc(m.awayTeam?.shortName || '?')}</span>
            ${pill}
        </div>`;
    }).join('');

    const statusMsg = allDone
        ? '✅ All matches finished — applying results now...'
        : `⏳ Watching for results. Checks every 5 min.${lastResultsCheck ? ' Last: ' + lastResultsCheck.toLocaleTimeString('en-GB') : ''}`;

    document.getElementById('app').innerHTML = `
        <div class="layout">
            <div>
                <div class="card">
                    ${renderAdminTab()}
                    <div class="phase-label">Round ${round.id} — Results</div>
                    <h2>Auto-processing results</h2>
                    ${liveDataError ? `<div class="live-error">⚠️ ${esc(liveDataError)}</div>` : ''}
                    <div class="auto-status">${statusMsg}</div>
                    ${matchRows ? `
                        <div class="section-label" style="margin-bottom:6px">Gameweek ${cachedMatchday?.matchday || ''} matches</div>
                        ${matchRows}
                        <div class="divider"></div>` : ''}
                    <button class="btn btn-outline btn-full btn-sm" onclick="refreshResults()">🔄 Refresh Now</button>
                </div>
            </div>
            <div>${renderStandings()}${renderResultsFeed()}</div>
        </div>`;
}

function renderHostRoundDone(round) {
    const picks    = Object.values(round.picks || {});
    const survived  = picks.filter(p => p.result === 'win');
    const eliminated = picks.filter(p => p.result === 'out');

    document.getElementById('app').innerHTML = `

                <div class="card">
                    ${renderAdminTab()}
                    <div class="phase-label">Admin — Round Control</div>
                    <h2>Round ${round.id} — Complete</h2>

            <div>${renderStandings()}${renderHistory()}${renderResultsFeed()}</div>

// ── PLAYER VIEWS ─────────────────────────────────────────────────────────────

function renderPlayer(round) {
    // Reset sub-views when round is no longer open for picking
    if (playerSubView === 'confirmation' && round?.status !== 'picking') {
        playerSubView = 'main';
    }

    if (G.status === 'setup')    { renderPlayerLobby(); return; }
    if (G.status === 'complete') { renderComplete();    return; }

    const myPlayer = getPlayer(myPlayerId);
    if (!myPlayer?.active) { renderPlayerEliminated(); return; }

    // Sub-view overrides
    if (playerSubView === 'confirmation' && lastConfirmedTeam) { renderPlayerConfirmation(round); return; }
    if (playerSubView === 'history')                           { renderPlayerPickHistory();       return; }
    if (playerSubView === 'allpicks')                          { renderPlayerAllPicks();          return; }
    if (playerSubView === 'feed')                              { renderPlayerFeed();              return; }

    if (!round)                      { renderPlayerWaiting('Waiting for the host to start the next round...'); return; }
    if (round.status === 'picking')  { renderPlayerPicking(round); return; }
    if (round.status === 'results')  { renderPlayerWaiting('Results are being entered by the host. Hang tight...'); return; }
    if (round.status === 'done')     { renderPlayerRoundDone(round); return; }
}

function renderPlayerLobby() {
    const ps = players();
    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            ${renderHostPlayerBanner()}
            <div class="card">
                <div class="phase-label">Lobby — Game ${esc(G.gameName || gameCode)}</div>
                <h2>You're in!</h2>
                <p class="help-text">Waiting for the host to start the game.</p>
                ${ps.map(p => `
                    <div class="player-row">
                        <span class="player-name">${esc(p.name)}</span>
                        ${p.id === myPlayerId ? '<span class="status-pill pill-in">You</span>' : ''}
                    </div>`).join('')}
                ${role !== 'host' ? `
                    <div class="divider"></div>
                    <button class="btn btn-outline btn-full btn-sm" onclick="leaveGamePermanently()">Leave Game</button>` : ''}
            </div>
            ${renderMyPickHistoryBtn()}
        </div>`;
}

function renderPlayerPicking(round) {
    const myPick = (round.picks || {})[myPlayerId];
    if (!myPick) { renderPlayerWaiting('Round in progress...'); return; }

    const myPlayer  = getPlayer(myPlayerId);
    const usedTeams = myPlayer?.usedTeams || {};

    // Feature 4 — all 20 teams; used ones greyed out, available ones tappable
    const teamGrid = getTeams().map(t => {
        const isUsed     = !!usedTeams[t];
        const isSelected = myPick.team === t;
        if (isUsed) {
            return `<button class="team-btn team-used" disabled title="Already used">${esc(t)}</button>`;
        }
        return `<button class="team-btn${isSelected ? ' team-selected' : ''}"
            data-team="${esc(t)}" onclick="playerSetPick(this.dataset.team)">${esc(t)}</button>`;
    }).join('');

    // Feature 2 — countdown if admin set a close time
    const countdownHtml = round.closeTime ? `
        <div class="countdown-box">
            <div class="cd-label">Picks close in</div>
            <div class="cd-time" id="countdownDisplay">—</div>
        </div>` : '';

    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            ${renderHostPlayerBanner()}
            ${renderSurvivalBanner()}
            <div class="card">
                <div class="phase-label">Round ${round.id} — Your Pick</div>
                <h2>Choose your team</h2>
                ${countdownHtml}
                <p class="help-text" style="margin-bottom:12px">
                    Tap a team to pick it. Greyed-out teams have already been used this season.
                    Your pick saves immediately — you can change it until the host locks picks.
                </p>
                <div class="team-grid">${teamGrid}</div>
                ${myPick.team ? `
                    <div class="picked-confirm">
                        ✅ Current pick: <strong>${esc(myPick.team)}</strong>
                    </div>` : ''}
            </div>
            ${renderMyPickHistoryBtn()}
            ${renderPhase3Nav()}
            ${renderStandings()}
        </div>`;

    if (round.closeTime) startCountdown(round.closeTime);
}

    const countdownHtml = (round?.closeTime && round.status === 'picking') ? `
        <div class="countdown-box" style="margin-bottom:16px">
            <div class="cd-label">Picks close in</div>
            <div class="cd-time" id="countdownDisplay">—</div>
        </div>` : '';

    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            ${renderHostPlayerBanner()}
            ${renderSurvivalBanner()}
            <div class="card" style="text-align:center;padding:32px 20px">
                ${countdownHtml}
                <div style="font-size:32px;margin-bottom:12px">⏳</div>
                <p style="color:var(--grey);line-height:1.6">${esc(msg)}</p>
            </div>
            ${renderMyPickHistoryBtn()}
            ${renderPhase3Nav()}
            ${renderStandings()}
        </div>`;

    if (round?.closeTime && round.status === 'picking') startCountdown(round.closeTime);
}

function renderPlayerEliminated() {
    // Feature 6 — survival banner shows elimination details
    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            ${renderHostPlayerBanner()}
            ${renderSurvivalBanner()}
            <div class="card" style="text-align:center;padding:28px 20px">
                <div style="font-size:36px;margin-bottom:10px">😬</div>
                <p style="color:var(--grey);font-size:14px;line-height:1.6">You can still watch the rest of the game below.</p>
            </div>
            ${renderMyPickHistoryBtn()}
            ${renderPhase3Nav()}
            ${renderStandings()}${renderHistory()}
        </div>`;
}

function renderPlayerRoundDone(round) {
    const myPick   = (round.picks || {})[myPlayerId];
    const survived = myPick?.result === 'win';

    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            ${renderHostPlayerBanner()}
            ${renderSurvivalBanner()}
            <div class="card">
                <div class="phase-label">Round ${round.id} — Done</div>
                <h2>${survived ? '✅ You survived!' : "❌ You're out"}</h2>
                <p class="help-text" style="margin-bottom:${myPick ? '0' : '0'}">
                    ${survived
                        ? `${esc(myPick?.team)} won. Waiting for the host to start round ${round.id + 1}.`
                        : `${esc(myPick?.team)} didn't win this weekend.`}
                </p>
                ${myPick ? `<button class="copy-result-btn" onclick="copyRoundResult(${round.id})">📋 Copy result to share</button>` : ''}
            </div>
            ${renderRoundPickReveal(round)}
            ${renderMyPickHistoryBtn()}
            ${renderPhase3Nav()}
            ${renderStandings()}${renderHistory()}
        </div>`;
}

// ── Feature 1 — Confirmation screen ──────────────────────────────────────────

function renderPlayerConfirmation(round) {
    const myPlayer = getPlayer(myPlayerId);
    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            <div class="card pick-confirmation">
                <div style="font-size:48px;margin-bottom:6px">✅</div>
                <div style="font-size:12px;color:var(--grey);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">Round ${round?.id || ''} — Pick confirmed</div>
                <div class="conf-team">${esc(lastConfirmedTeam)}</div>
                <div class="conf-meta">
                    <strong>${esc(myPlayer?.name || '')}</strong><br>
                    Pick saved. You can change it until the host locks picks.
                </div>
                <button class="btn btn-outline btn-full" onclick="playerSubView='main';render()">← Back</button>
            </div>
        </div>`;
}

// ── Feature 3 — Personal pick history ────────────────────────────────────────

function renderPlayerPickHistory() {
    const myPlayer = getPlayer(myPlayerId);
    const done = rounds().filter(r => r.status === 'done');

    const rows = done.length ? done.map(round => {
        const pick = (round.picks || {})[myPlayerId];
        if (!pick) return '';
        let pill = '';
        if (pick.result === 'win')      pill = '<span class="status-pill pill-in">✓ Survived</span>';
        else if (pick.result === 'out') pill = '<span class="status-pill pill-out">✕ Eliminated</span>';
        return `<div class="reveal-row">
            <span style="font-weight:600">Round ${round.id}</span>
            <span class="reveal-team">${esc(pick.team || '—')}</span>
            ${pill}
        </div>`;
    }).join('') : '<div class="empty-state">No completed rounds yet.</div>';

    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            <div class="card">
                <div class="phase-label">Pick History</div>
                <h2>${esc(myPlayer?.name || 'Your picks')}</h2>
                <div style="margin-top:12px">${rows}</div>
            </div>
            <button class="btn btn-outline btn-full" onclick="playerSubView='main';render()">← Back</button>
        </div>`;
}

// ── COMPLETE ─────────────────────────────────────────────────────────────────

function renderComplete() {
    const winner = G.winner ? getPlayer(G.winner) : null;
    const isHost = role === 'host';

    document.getElementById('app').innerHTML = `
        <div class="layout">
            <div>
                ${winner ? `
                    <div class="winner-banner">
                        <div class="trophy">🏆</div>
                        <div class="winner-label">Last Man Standing</div>
                        <div class="winner-name">${esc(winner.name)}</div>
                        <div class="rounds-survived">Survived all ${rounds().length} rounds</div>
                    </div>` : `
                    <div class="card" style="margin-bottom:20px">
                        <h2>🤝 Everyone went out in Round ${rounds().length}!</h2>
                        <p class="help-text" style="margin-bottom:0">All remaining players were eliminated in the same round — no winner this time.</p>
                    </div>`}

                ${renderSeasonStats()}
                <div class="card">
                    ${isHost
                        ? `<button class="btn btn-outline btn-full" onclick="confirmReset()">Start a New Game</button>`
                        : `<button class="btn btn-outline btn-full" onclick="confirmLeave()">Leave Game</button>`}
                </div>
            </div>
            <div>${renderStandings()}${renderHistory()}${renderResultsFeed()}</div>
        </div>`;
}

// ── STANDINGS ─────────────────────────────────────────────────────────────────

function renderStandings() {
    if (!G) return '';
    const ps = players();
    const inPs  = activePlayers().filter(p => p.id !== G.winner);
    const outPs = ps.filter(p => !p.active).sort((a, b) => (b.eliminatedRound || 0) - (a.eliminatedRound || 0));

    let html = '<div class="card"><h2>Standings</h2>';

    if (!ps.length) return html + '<div class="empty-state">No players yet.</div></div>';

    if (G.winner) {
        const w = getPlayer(G.winner);
        html += `<div class="player-row">
            <span class="player-name">${esc(w?.name)}</span>
            <span class="status-pill pill-winner">🏆 Winner</span>
        </div>`;
    }

    const doneRounds = rounds().filter(r => r.status === 'done');
    inPs.forEach(p => {
        const survCount = doneRounds.filter(r => (r.picks||{})[p.id]?.result === 'win').length;
        const isMe = p.id === myPlayerId;
        html += `<div class="player-row">
            <span class="player-name">${esc(p.name)}${isMe ? ' <span style="font-size:11px;color:var(--grey);font-weight:400">(you)</span>' : ''}</span>
            <span class="status-pill pill-in">${survCount > 0 ? survCount + (survCount === 1 ? ' round' : ' rounds') : 'In'}</span>
        </div>`;
    });

    if (outPs.length) {
        html += `<div class="divider"></div><div class="section-label">Eliminated</div>`;
        outPs.forEach(p => {
            html += `<div class="player-row">
                <span class="player-name elim-name">${esc(p.name)}</span>
                <span class="status-pill pill-out">Rd ${p.eliminatedRound}</span>
            </div>`;
        });
    }

    return html + '</div>';
}

// ── HISTORY ───────────────────────────────────────────────────────────────────

function renderHistory() {
    if (!G) return '';
    const done = rounds().filter(r => r.status === 'done');
    if (!done.length) return '<div class="card"><h2>Pick History</h2><div class="empty-state">No rounds completed yet.</div></div>';

    const ps = players();
    const rows = ps.map(p => {
        const cells = done.map(round => {
            const pick = (round.picks || {})[p.id];
            if (!pick) return '<td style="color:#ccc">—</td>';
            const cls  = pick.result === 'win' ? 'pick-win' : 'pick-out';
            const icon = pick.result === 'win' ? '✓' : '✕';
            return `<td class="${cls}">${esc(pick.team)} ${icon}</td>`;
        }).join('');
        return `<tr><td style="font-weight:600">${esc(p.name)}</td>${cells}</tr>`;
    }).join('');

    const headers = done.map(r => `<th>Rd ${r.id}</th>`).join('');

    return `
        <div class="card">
            <h2>Pick History</h2>
            <div class="history-wrap">
                <table>
                    <thead><tr><th>Player</th>${headers}</tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        </div>`;
}

// ── PHASE 3: RESULTS FEED ────────────────────────────────────────────────────

function renderResultsFeed() {
    if (!G) return '';
    const done = rounds().filter(r => r.status === 'done').slice().reverse();
    if (!done.length) return '';

    const entries = done.map(round => {
        const picks     = Object.values(round.picks || {});
        const eliminated = picks.filter(p => p.result === 'out');
        const survivors  = picks.filter(p => p.result === 'win');

        const elimHtml = eliminated.length
            ? eliminated.map(p => `<div class="feed-elim">❌ ${esc(getPlayer(p.playerId)?.name || '?')} — ${esc(p.team)}</div>`).join('')
            : `<div style="color:var(--grey);font-size:12px">No eliminations this round.</div>`;

        const survHtml = survivors.map(p =>
            `<div class="feed-survive">✅ ${esc(getPlayer(p.playerId)?.name || '?')} — ${esc(p.team)}</div>`
        ).join('');

        return `<div class="feed-entry">
            <div class="feed-round-header">Round ${round.id}</div>
            ${elimHtml}
            ${survHtml}
        </div>`;
    }).join('');

    return `<div class="card"><h2>Results Feed</h2>
        <p class="help-text" style="margin-bottom:12px">Most recent round first.</p>
        ${entries}
    </div>`;
}

function renderPlayerFeed() {
    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            ${renderResultsFeed() || '<div class="card"><div class="empty-state">No completed rounds yet.</div></div>'}
            <button class="btn btn-outline btn-full" onclick="playerSubView=\'main\';render()">← Back</button>
        </div>`;
}

// ── PHASE 3: ALL PICKS SCREEN ─────────────────────────────────────────────────

function renderPlayerAllPicks() {
    document.getElementById('app').innerHTML = `
        <div class="center-wrap">
            ${renderHistory()}
            <button class="btn btn-outline btn-full" onclick="playerSubView=\'main\';render()">← Back</button>
        </div>`;
}

// ── PHASE 3: SEASON STATS ─────────────────────────────────────────────────────

function renderSeasonStats() {
    const ps   = players();
    const done = rounds().filter(r => r.status === 'done');
    if (!done.length && !G.winner) return '';

    const winner = G.winner ? getPlayer(G.winner) : null;

    const eliminated = ps.filter(p => !p.active && p.eliminatedRound);
    const earliest   = eliminated.slice().sort((a, b) => a.eliminatedRound - b.eliminatedRound)[0];

    let longestStreak = null;
    if (winner) {
        longestStreak = { name: winner.name, rounds: done.length };
    } else if (eliminated.length) {
        const latest = eliminated.slice().sort((a, b) => b.eliminatedRound - a.eliminatedRound)[0];
        longestStreak = { name: latest.name, rounds: (latest.eliminatedRound || 1) - 1 };
    }

    const elimCounts = {};
    done.forEach(round => {
        Object.values(round.picks || {}).forEach(pick => {
            if (pick.result === 'out' && pick.team) {
                elimCounts[pick.team] = (elimCounts[pick.team] || 0) + 1;
            }
        });
    });
    const killerEntry = Object.entries(elimCounts).sort((a, b) => b[1] - a[1])[0];

    return `<div class="card" style="margin-bottom:20px">
        <h2>Season Stats</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">🏆 Winner</div>
                <div class="stat-value">${winner ? esc(winner.name) : 'No winner'}</div>
            </div>
            ${earliest ? `<div class="stat-item">
                <div class="stat-label">💀 First Out</div>
                <div class="stat-value">${esc(earliest.name)}</div>
                <div class="stat-sub">Round ${earliest.eliminatedRound}</div>
            </div>` : ''}
            ${longestStreak && longestStreak.rounds > 0 ? `<div class="stat-item">
                <div class="stat-label">🔥 Longest Run</div>
                <div class="stat-value">${esc(longestStreak.name)}</div>
                <div class="stat-sub">${longestStreak.rounds} round${longestStreak.rounds !== 1 ? 's' : ''}</div>
            </div>` : ''}
            ${killerEntry ? `<div class="stat-item">
                <div class="stat-label">☠️ Killer Team</div>
                <div class="stat-value">${esc(killerEntry[0])}</div>
                <div class="stat-sub">Eliminated ${killerEntry[1]} player${killerEntry[1] !== 1 ? 's' : ''}</div>
            </div>` : ''}
        </div>
    </div>`;
}

// ── PHASE 3: SHARE CARD ───────────────────────────────────────────────────────

function copyRoundResult(roundId) {
    const round = rounds().find(r => r.id === roundId);
    if (!round) return;
    const myPick  = (round.picks || {})[myPlayerId];
    const survived = myPick?.result === 'win';
    const active   = activePlayers().length;
    const text = survived
        ? `✅ I survived Round ${roundId} of Last Man Standing! ${active} player${active !== 1 ? 's' : ''} still in. 🏆`
        : `❌ I went out in Round ${roundId} of Last Man Standing. ${active} player${active !== 1 ? 's' : ''} still standing.`;
    navigator.clipboard.writeText(text).then(() => alert('Copied! Share it wherever you like.'));
}

// ── PHASE 3: PLAYER NAV ───────────────────────────────────────────────────────

function renderPhase3Nav() {
    const done = rounds().filter(r => r.status === 'done');
    if (!done.length) return '';
    return `<div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-outline btn-full btn-sm" onclick="playerSubView='allpicks';render()">📊 All Picks Grid</button>
        <button class="btn btn-outline btn-full btn-sm" onclick="playerSubView='feed';render()">📰 Results Feed</button>
    </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
migrateLegacyLocalStorage();
render();
</script>
</body>
</html>
